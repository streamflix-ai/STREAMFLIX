<!DOCTYPE html>
<html>
<head>
<title>STREAMFLIX Login</title>

<style>

body{
    margin:0;
    background:#111;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#222;
    padding:40px;
    border-radius:10px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.logo{
    color:red;
    font-size:35px;
    font-weight:bold;
    margin-bottom:20px;
}

h2{
    color:white;
}

input{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button{
    width:95%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

p{
    color:white;
}

a{
    color:red;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">STREAMFLIX</div>

    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p>
        Demo Login:<br>
        Username: <b>admin</b><br>
        Password: <b>1234</b>
    </p>

</div>

<script>

function login(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){

    localStorage.setItem("username", user);

    window.location.href = "index.html";

}

        alert("Login Successful!");

        window.location.href = "index.html";

    }else{

        alert("Wrong Username or Password");

    }

}

</script>

</body>
</html>
